name: Publish @josephhaaga/agent-profiler

on:
  push:
    tags:
      - "agent-profiler@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing + npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp version from tag
        # Tag format: agent-profiler@1.2.3  →  version: 1.2.3
        run: |
          VERSION="${GITHUB_REF_NAME#agent-profiler@}"
          npm version "$VERSION" --no-git-tag-version --workspaces=false
        working-directory: packages/cli

      - name: Build (all packages, then CLI bundle)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (Trusted Publishing requires npm 11.5.1+)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public --provenance --workspaces=false
        working-directory: packages/cli

