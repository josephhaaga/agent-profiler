name: Publish opencode-agent-profiler

on:
  push:
    tags:
      - "opencode-agent-profiler@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing + npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (Trusted Publishing requires npm 11.5.1+)
        run: npm install -g npm@latest

      - name: Publish to npm
        # No NODE_AUTH_TOKEN needed — OIDC Trusted Publishing exchanges the
        # GitHub Actions id-token for a short-lived npm token automatically.
        # --workspaces=false prevents npm from refusing to publish because the
        # repo root package.json declares workspaces.
        run: npm publish --access public --provenance --workspaces=false
        working-directory: integrations/opencode
