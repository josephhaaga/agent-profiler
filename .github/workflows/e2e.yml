name: E2E

on:
  push:
    branches: [main]
    paths:
      - "integrations/opencode/**"
      - "packages/server/**"
      - "packages/ingest/**"
      - "packages/store/**"
      - "packages/schema/**"
      - "packages/web/dist/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/opencode/**"
      - "packages/server/**"
      - "packages/ingest/**"
      - "packages/store/**"
      - "packages/schema/**"
      - "packages/web/dist/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to send to the agent"
        required: false
        default: "Say the word PING and nothing else."
      scenario:
        description: "Stub LLM scenario"
        required: false
        default: "tool-call-then-text"

jobs:
  e2e:
    name: E2E (stub LLM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (schema → server)
        run: |
          bun run --cwd packages/schema build
          bun run --cwd packages/store build
          bun run --cwd packages/ingest build
          bun run --cwd packages/profiler build
          bun run --cwd packages/server build || true   # server has no build step, OK to skip
          bun run --cwd packages/web build || true      # web may not need rebuild if dist/ committed

      - name: Build plugin
        run: bun run --cwd integrations/opencode build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e2e image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: integrations/opencode/test/container/Dockerfile
          push: false
          load: true
          tags: ap-e2e:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e (stub mode)
        run: |
          mkdir -p e2e-output
          docker run --rm \
            --volume "${{ github.workspace }}/e2e-output:/output" \
            ap-e2e:ci \
            --scenario "${{ github.event.inputs.scenario || 'tool-call-then-text' }}" \
            --record ci-run \
            "${{ github.event.inputs.prompt || 'Say the word PING and nothing else.' }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-output-${{ github.run_id }}
          path: e2e-output/
          retention-days: 14

      - name: Run replay tests (fast, no Docker)
        run: bun test integrations/opencode/src/trace-builder.replay.test.ts
